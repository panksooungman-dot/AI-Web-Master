name: Test Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build (root Next.js app)
        run: npm run build --if-present

      # `npm test`'s `pretest` script builds @ai-business-os/cli (packages/cli/dist)
      # before Vitest runs, since the CLI startup test executes the built bin/ai.js.
      - name: Run Vitest Suite
        run: npm test

      - name: Generate Coverage Report
        run: npm run coverage

      - name: Generate Test Summary
        run: |
          echo "=================================="
          echo "AI Business OS Test Pipeline"
          echo "=================================="
          echo "✓ npm ci"
          echo "✓ npm run build"
          echo "✓ npm test (Vitest)"
          echo "✓ npm run coverage"
          echo "=================================="

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore